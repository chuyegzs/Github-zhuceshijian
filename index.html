<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>GitHub 注册时间查看器</title>
  <style>
    :root {
      --bg-base: #000000;
      --bg-card: rgba(13, 17, 23, 0.7);
      --bg-input: rgba(255, 255, 255, 0.04);
      --border-subtle: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.2);
      --text-primary: #ffffff;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-glow: rgba(88, 166, 255, 0.15);
      --error-bg: rgba(248, 81, 73, 0.1);
      --error-text: #ff7b72;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* 背景环境光晕 */
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 80vw; height: 80vh;
      background: radial-gradient(circle at 50% 0%, rgba(26, 42, 68, 0.8) 0%, rgba(0,0,0,0) 60%);
      z-index: -1;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 480px;
      z-index: 1;
    }

    /* 头部 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .title {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title svg { fill: var(--text-primary); }

    /* 极简语言切换 */
    .lang-toggle {
      display: flex;
      gap: 4px;
      background: var(--bg-input);
      padding: 4px;
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
    }

    .lang-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 4px 10px;
      font-size: 0.8rem;
      font-weight: 500;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn.active {
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
    }

    /* 主卡片 */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 24px 40px rgba(0, 0, 0, 0.5);
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    /* 输入框区域 */
    .input-wrapper {
      position: relative;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .input-prefix {
      padding-left: 16px;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      user-select: none;
    }

    #username {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 1rem;
      font-family: var(--font-mono);
      padding: 16px 16px 16px 4px;
      outline: none;
      min-width: 0;
    }

    #username::placeholder { color: rgba(255,255,255,0.2); }

    /* 按钮组 */
    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--text-primary);
      color: var(--bg-base);
    }

    .btn-primary:hover {
      background: #e0e0e0;
      transform: translateY(-1px);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: transparent;
      color: var(--text-primary);
      border-color: var(--border-subtle);
    }

    .btn-secondary:hover {
      background: var(--bg-input);
      border-color: var(--border-hover);
    }

    /* 快捷示例 */
    .examples {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .examples button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }

    .examples button:hover { text-decoration: underline; }

    /* 结果面板 */
    .result-panel {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border-subtle);
      animation: fadeIn 0.4s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 1px solid var(--border-subtle);
    }

    .user-info h3 {
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .user-info p {
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }

    .time-block {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px; /* 增加间距 */
    }
    
    /* 最后一个 time-block 不需要下边距 */
    .time-block:last-child {
        margin-bottom: 0;
    }

    .time-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: block;
    }

    .time-value {
      font-size: 1.25rem;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--accent);
      margin-bottom: 6px;
    }

    .time-relative {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* 状态提示 */
    .status-area { margin-top: 16px; }

    .error-box {
      background: var(--error-bg);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: var(--error-text);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .loading-box {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 0;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border-subtle);
      border-top-color: var(--text-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">
      <svg height="24" viewBox="0 0 16 16" width="24"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
      <span data-i18n="title">GitHub 注册时间</span>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="zh">ZH</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </div>

  <div class="card">
    <div class="subtitle" data-i18n="subhead">输入用户名，探寻代码之旅的起点。</div>

    <div class="input-wrapper">
      <span class="input-prefix">github.com/</span>
      <input type="text" id="username" data-i18n-placeholder="placeholder" placeholder="例如: chuyegzs" autocomplete="off" spellcheck="false" autofocus>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="queryBtn">
        <span data-i18n="query">查询</span>
      </button>
      <button class="btn btn-secondary" id="clearBtn">
        <span data-i18n="clear">清空</span>
      </button>
    </div>

    <div class="examples">
      <span data-i18n="tryExamples">快捷测试:</span>
      <button class="example-btn" data-user="chuyegzs">chuyegzs</button> · 
      <button class="example-btn" data-user="baomihuahua">baomihuahua</button> · 
      <button class="example-btn" data-user="chanwj">chanwj</button>
    </div>

    <div id="statusArea" class="status-area"></div>

    <div id="resultPanel" class="result-panel hidden">
      <div id="resultContent"></div>
    </div>
  </div>

  <div class="footer" data-i18n="footerText">
    Open API · No Auth Required
  </div>
</div>

<script>
  (function() {
    "use strict";

    const i18n = {
      zh: {
        title: 'GitHub 注册时间',
        subhead: '输入用户名，探寻代码之旅的起点。',
        placeholder: '例如: chuyegzs',
        query: '查询',
        clear: '清空',
        tryExamples: '快捷测试:',
        footerText: '基于 GitHub 公开 API · 无需登录授权',
        loading: '正在连接 GitHub 网络...',
        errorNetwork: '网络请求失败，请检查连接',
        errorNotFound: '未找到该用户: {username}',
        errorRateLimit: 'API 请求超限{resetMsg}。',
        errorGeneric: '服务器响应异常 ({status})',
        errorEmpty: '用户名不能为空',
        regLabel: '账号创建时间 (UTC+8)',
        durationLabel: '已注册时长', // 新增
        yearsAgo: (years) => `${years} 年前`,
        monthsAgo: (months) => `${months} 个月前`,
        daysAgo: (days) => days >= 2 ? `${days} 天前` : (days === 1 ? '昨天' : '今天'),
        resetTimeMsg: (timeStr) => `，重置时间：${timeStr}`,
        // 新增：精确时长格式化
        durationFormat: (y, m, d, totalDays) => `${y}年 ${m}月 ${d}日 （总计 ${totalDays}天）`,
        dateFormat: (date) => {
          const beijingTime = new Date(date.getTime() + 8 * 60 * 60 * 1000);
          const y = beijingTime.getUTCFullYear();
          const m = String(beijingTime.getUTCMonth() + 1).padStart(2, '0');
          const d = String(beijingTime.getUTCDate()).padStart(2, '0');
          const h = String(beijingTime.getUTCHours()).padStart(2, '0');
          const min = String(beijingTime.getUTCMinutes()).padStart(2, '0');
          const s = String(beijingTime.getUTCSeconds()).padStart(2, '0');
          return `${y}-${m}-${d} ${h}:${min}:${s}`;
        }
      },
      en: {
        title: 'GitHub Join Date',
        subhead: 'Discover the exact moment a developer journey began.',
        placeholder: 'e.g. chuyegzs',
        query: 'Search',
        clear: 'Clear',
        tryExamples: 'Try:',
        footerText: 'Powered by GitHub Public API · No Auth Required',
        loading: 'Connecting to GitHub...',
        errorNetwork: 'Network error, check your connection',
        errorNotFound: 'User not found: {username}',
        errorRateLimit: 'Rate limit exceeded{resetMsg}.',
        errorGeneric: 'Request failed ({status})',
        errorEmpty: 'Username cannot be empty',
        regLabel: 'ACCOUNT CREATED AT (UTC)',
        durationLabel: 'ACCOUNT AGE', // 新增
        yearsAgo: (years) => `${years} years ago`,
        monthsAgo: (months) => `${months} months ago`,
        daysAgo: (days) => days >= 2 ? `${days} days ago` : (days === 1 ? 'Yesterday' : 'Today'),
        resetTimeMsg: (timeStr) => ` (Resets at ${timeStr})`,
        // 新增：英文精确时长格式化
        durationFormat: (y, m, d, totalDays) => `${y}y ${m}m ${d}d (${totalDays} days total)`,
        dateFormat: (date) => {
          const y = date.getUTCFullYear();
          const m = String(date.getUTCMonth() + 1).padStart(2, '0');
          const d = String(date.getUTCDate()).padStart(2, '0');
          const h = String(date.getUTCHours()).padStart(2, '0');
          const min = String(date.getUTCMinutes()).padStart(2, '0');
          const s = String(date.getUTCSeconds()).padStart(2, '0');
          return `${y}-${m}-${d} ${h}:${min}:${s}`;
        }
      }
    };

    let currentLang = 'zh';

    const dom = {
      input: document.getElementById('username'),
      query: document.getElementById('queryBtn'),
      clear: document.getElementById('clearBtn'),
      panel: document.getElementById('resultPanel'),
      content: document.getElementById('resultContent'),
      status: document.getElementById('statusArea'),
      langs: document.querySelectorAll('.lang-btn'),
      i18nEls: document.querySelectorAll('[data-i18n]'),
      i18nPl: document.querySelector('[data-i18n-placeholder]')
    };

    function updateI18n(lang) {
      currentLang = lang;
      const pack = i18n[lang];
      
      dom.i18nEls.forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (pack[key]) el.textContent = pack[key];
      });
      if (dom.i18nPl && pack.placeholder) dom.i18nPl.placeholder = pack.placeholder;
      
      dom.langs.forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-lang') === lang));
      
      if (!dom.panel.classList.contains('hidden') && window.lastData) renderResult(window.lastData);
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
    }

    function setStatus(type, msg) {
      dom.status.innerHTML = '';
      if (!type) return;
      
      if (type === 'loading') {
        dom.status.innerHTML = `<div class="loading-box"><div class="spinner"></div><span>${msg}</span></div>`;
      } else if (type === 'error') {
        dom.status.innerHTML = `
          <div class="error-box">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2.343 13.657A8 8 0 1 1 13.658 2.343 8 8 0 0 1 2.343 13.657ZM6.03 4.97a.75.75 0 0 0-1.06 1.06L6.94 8 4.97 9.97a.75.75 0 1 0 1.06 1.06L8 9.06l1.97 1.97a.75.75 0 1 0 1.06-1.06L9.06 8l1.97-1.97a.75.75 0 1 0-1.06-1.06L8 6.94 6.03 4.97Z"></path></svg>
            <span>${escapeHtml(msg)}</span>
          </div>`;
      }
    }

    // 新增：核心计算函数 - 计算精确的年、月、日和总天数
    function calculateExactAge(startDateStr) {
      const startDate = new Date(startDateStr);
      const endDate = new Date(); // 当前时间

      if (isNaN(startDate.getTime())) return null;

      // 1. 计算总天数 (简单的时间戳差值)
      const totalDays = Math.floor((endDate - startDate) / (1000 * 60 * 60 * 24));

      // 2. 计算精确的年、月、日
      let years = endDate.getFullYear() - startDate.getFullYear();
      let months = endDate.getMonth() - startDate.getMonth();
      let days = endDate.getDate() - startDate.getDate();

      // 调整天数如果是负数
      if (days < 0) {
        months--;
        // 获取上一个月的最后一天
        const prevMonthLastDay = new Date(endDate.getFullYear(), endDate.getMonth(), 0).getDate();
        days += prevMonthLastDay;
      }

      // 调整月份如果是负数
      if (months < 0) {
        years--;
        months += 12;
      }

      return { years, months, days, totalDays };
    }
    
    // 修改：相对时间计算（用于第一栏下方的简短文字）
    function calcRelative(isoString) {
      const created = new Date(isoString);
      if (isNaN(created.getTime())) return '';
      const diff = Math.floor((new Date() - created) / (1000 * 60 * 60 * 24));
      const pack = i18n[currentLang];
      // 保持原样，提供模糊概念
      if (diff >= 365) return pack.yearsAgo(Math.floor(diff / 365.25));
      if (diff >= 30) return pack.monthsAgo(Math.floor(diff / 30.44));
      return pack.daysAgo(diff);
    }

    function renderResult(data) {
      window.lastData = data;
      const pack = i18n[currentLang];
      
      // 1. 格式化注册日期时刻
      const dateStr = pack.dateFormat(new Date(data.created_at));
      const relStr = calcRelative(data.created_at);

      // 2. 计算精确已注册时长
      const age = calculateExactAge(data.created_at);
      let durationStr = '';
      if (age) {
          durationStr = pack.durationFormat(age.years, age.months, age.days, age.totalDays);
      }

      dom.content.innerHTML = `
        <div class="user-profile">
          <img class="avatar" src="${data.avatar_url}" alt="Avatar">
          <div class="user-info">
            <h3>${escapeHtml(data.name || data.login)}</h3>
            <p>@${escapeHtml(data.login)}</p>
          </div>
        </div>
        
        <!-- 第一栏：注册时刻 -->
        <div class="time-block">
          <span class="time-label">${pack.regLabel}</span>
          <div class="time-value">${dateStr}</div>
          <div class="time-relative">${relStr}</div>
        </div>
        
        <!-- 第二栏：新增的已注册时长 -->
        ${age ? `
        <div class="time-block">
          <span class="time-label">${pack.durationLabel}</span>
          <div class="time-value" style="font-size: 1.1rem; color: var(--text-primary);">
            ${escapeHtml(durationStr)}
          </div>
        </div>
        ` : ''}
      `;
      
      dom.panel.classList.remove('hidden');
      
      // 重新触发动画
      dom.panel.style.animation = 'none';
      void dom.panel.offsetWidth;
      dom.panel.style.animation = 'fadeIn 0.4s ease forwards';
    }

    async function doSearch() {
      const user = dom.input.value.trim();
      dom.panel.classList.add('hidden');
      
      if (!user) return setStatus('error', i18n[currentLang].errorEmpty);
      
      setStatus('loading', i18n[currentLang].loading);
      
      try {
        const res = await fetch(`https://api.github.com/users/${encodeURIComponent(user)}`, {
          headers: { 'Accept': 'application/vnd.github.v3+json' }
        });
        
        if (res.status === 404) throw new Error(i18n[currentLang].errorNotFound.replace('{username}', user));
        if (res.status === 403) {
          const reset = res.headers.get('x-ratelimit-reset');
          const resetMsg = reset ? i18n[currentLang].resetTimeMsg(new Date(reset * 1000).toLocaleTimeString()) : '';
          throw new Error(i18n[currentLang].errorRateLimit.replace('{resetMsg}', resetMsg));
        }
        if (!res.ok) throw new Error(i18n[currentLang].errorGeneric.replace('{status}', res.status));
        
        const data = await res.json();
        setStatus(null);
        renderResult(data);
      } catch (err) {
        setStatus('error', err.message.includes('fetch') ? i18n[currentLang].errorNetwork : err.message);
      }
    }

    dom.query.addEventListener('click', doSearch);
    dom.input.addEventListener('keypress', e => e.key === 'Enter' && doSearch());
    dom.clear.addEventListener('click', () => {
      dom.input.value = '';
      dom.panel.classList.add('hidden');
      setStatus(null);
      window.lastData = null;
      dom.input.focus();
    });

    document.querySelectorAll('.example-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        dom.input.value = btn.getAttribute('data-user');
        doSearch();
      });
    });

    dom.langs.forEach(btn => {
      btn.addEventListener('click', () => updateI18n(btn.getAttribute('data-lang')));
    });

    updateI18n('zh');

    const params = new URLSearchParams(window.location.search);
    if (params.get('user')) {
      dom.input.value = params.get('user');
      setTimeout(doSearch, 100);
    }
  })();
</script>
</body>
</html>
